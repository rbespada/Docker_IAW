version: '3.8'

services:
  # Servidor de aplicación Node.js
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: webstack_app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - ./data:/data
    networks:
      - webstack_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: webstack_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - webstack_network
    restart: unless-stopped
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:15-alpine
    container_name: webstack_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webstack
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - webstack_network
    restart: unless-stopped

  product:
    build:
      context: ./services/product
      dockerfile: Dockerfile
    container_name: webstack_product
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/webstack
      PORT: 4001
    networks:
      - webstack_network
    restart: unless-stopped
    depends_on:
      - db

  cart:
    build:
      context: ./services/cart
      dockerfile: Dockerfile
    container_name: webstack_cart
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/webstack
      PORT: 4002
    networks:
      - webstack_network
    restart: unless-stopped
    depends_on:
      - db

  user:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    container_name: webstack_user
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/webstack
      PORT: 4003
    networks:
      - webstack_network
    restart: unless-stopped
    depends_on:
      - db

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: webstack_gateway
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
    networks:
      - webstack_network
    restart: unless-stopped
    depends_on:
      - product
      - cart
      - user

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webstack_frontend
    ports:
      - "5173:5173"
    networks:
      - webstack_network
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000

  cms:
    build:
      context: ./services/cms
      dockerfile: Dockerfile
    container_name: webstack_cms
    ports:
      - "1337:1337"
    environment:
      - HOST=0.0.0.0
      - PORT=1337
    volumes:
      - cms_data:/srv/app/data
    networks:
      - webstack_network
    restart: unless-stopped
    depends_on:
      - db

  orders:
    build:
      context: ./services/orders
      dockerfile: Dockerfile
    container_name: webstack_orders
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/webstack
      PORT: 4004
    networks:
      - webstack_network
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "4004:4004"

networks:
  webstack_network:
    driver: bridge

volumes:
  nginx_logs:
    driver: local
  db_data:
    driver: local
  cms_data:
    driver: local
