apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: webstack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: webstack/api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4000
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: webstack-config
              key: NODE_ENV
        - name: PORT
          value: "4000"
        - name: PRODUCT_SERVICE_URL
          value: "http://product-service:4001"
        - name: CART_SERVICE_URL
          value: "http://cart-service:4002"
        - name: USER_SERVICE_URL
          value: "http://user-service:4003"
        - name: ORDERS_SERVICE_URL
          value: "http://orders-service:4004"
        - name: CMS_SERVICE_URL
          value: "http://strapi:1337"
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: webstack
spec:
  selector:
    app: api-gateway
  ports:
  - port: 4000
    targetPort: 4000
  type: LoadBalancer
