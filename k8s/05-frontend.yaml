apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: webstack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: webstack/frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5173
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: webstack-config
              key: NODE_ENV
        - name: VITE_API_URL
          value: "http://api-gateway:4000"
        livenessProbe:
          httpGet:
            path: /
            port: 5173
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5173
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: webstack
spec:
  selector:
    app: frontend
  ports:
  - port: 5173
    targetPort: 5173
  type: LoadBalancer
