apiVersion: v1
kind: Namespace
metadata:
  name: webstack
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: webstack-config
  namespace: webstack
data:
  NODE_ENV: production
  LOG_LEVEL: info
---
apiVersion: v1
kind: Secret
metadata:
  name: webstack-secrets
  namespace: webstack
type: Opaque
stringData:
  DATABASE_URL: "postgres://postgres:postgres@postgres:5432/webstack"
  STRAPI_HOST: "0.0.0.0"
  STRAPI_PORT: "1337"
  ADMIN_JWT_SECRET: "your-secret-key-here"
  API_TOKEN_SALT: "your-token-salt-here"
