apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: webstack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
      - name: product-service
        image: webstack/product-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4001
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: webstack-config
              key: NODE_ENV
        - name: PORT
          value: "4001"
        - name: DATABASE_HOST
          value: postgres
        - name: DATABASE_PORT
          value: "5432"
        - name: DATABASE_NAME
          value: webstack
        - name: DATABASE_USER
          value: postgres
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: webstack-secrets
              key: DB_PASSWORD
        livenessProbe:
          httpGet:
            path: /health
            port: 4001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 4001
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: webstack
spec:
  selector:
    app: product-service
  ports:
  - port: 4001
    targetPort: 4001
  type: ClusterIP
---
